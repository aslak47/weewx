        batteryStatus3         = Bateria3
        batteryStatus4         = Bateria4
        batteryStatus5         = Bateria5
        batteryStatus6         = Bateria6
        batteryStatus7         = Bateria7
        batteryStatus8         = Bateria8
        signal1                = Senyal1
        signal2                = Senyal2
        signal3                = Senyal3
        signal4                = Senyal4
        signal5                = Senyal5
        signal6                = Senyal6
        signal7                = Senyal7
        signal8                = Senyal8

[Almanac]

    # The labels to be used for the phases of the moon:
    moon_phases = lluna nova, lluna nova visible, quart creixent, lluna creixent gibosa, lluna plena, lluna minvant gibosa, quart minvant, lluna minvant

