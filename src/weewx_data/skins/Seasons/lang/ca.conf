        extraTemp3             = Temperatura3
        extraTemp4             = Temperatura4
        extraTemp5             = Temperatura5
        extraTemp6             = Temperatura6
        extraTemp7             = Temperatura7
        extraTemp8             = Temperatura8
        heatindex              = Índex de calor
        inDewpoint             = Punt de rosada interior
        inHumidity             = Humitat interior
        inTemp                 = Temperatura interior
        interval               = Interval
        leafTemp1              = Temperatura de la fulla1
        leafTemp2              = Temperatura de la fulla2
        leafWet1               = Humitat de la fulla1
        leafWet2               = Humitat de la fulla2
        lightning_distance     = Distància dels llamps
        lightning_strike_count = Nombre de llamps
        luminosity             = Lluminositat
        outHumidity            = Humitat exterior
        outTemp                = Temperatura exterior
        pressure               = Pressió                 # QFE
        pressureRate           = Taxa de canvi de pressió
        radiation              = Radiació
        rain                   = Pluja
        rainRate               = Intensitat de pluja
        soilMoist1             = Humitat del terra1
        soilMoist2             = Humitat del terra2
        soilMoist3             = Humitat del terra3
        soilMoist4             = Humitat del terra4
        soilTemp1              = Temperatura del terra1
        soilTemp2              = Temperatura del terra2
        soilTemp3              = Temperatura del terra3
        soilTemp4              = Temperatura del terra4
        THSW                   = Índex de temperatura-Humitat-sol-vent (THSW)
        UV                     = Índex ultraviolat (UV)
        wind                   = Vent
        windchill              = Sensació tèrmica
        windDir                = Direcció del vent
        windGust               = Velocitat de les ràfegues de vent
        windGustDir            = Direcció de les ràfegues de vent
        windgustvec            = Vector de les ràfegues de vent
        windrun                = Quantitat de vent
        windSpeed              = Velocitat del vent
        windvec                = Vector del vent

        # used in Seasons skin, but not defined
        feel                   = Temperatura aparent

        # Sensor status indicators
        consBatteryVoltage     = Voltatge de la bateria de la consola
        heatingVoltage         = Voltatge de la bateria de calefacció
        inTempBatteryStatus    = Estat de la bateria per a la temperatura interior
        outTempBatteryStatus   = Estat de la bateria per a la temperatura exterior
        rainBatteryStatus      = Estat de la bateria per a la pluja
        referenceVoltage       = Voltatge de referència
        rxCheckPercent         = Qualitat de la senyal rebuda
        supplyVoltage          = Voltatge de la font de potència
        txBatteryStatus        = Estat de la bateria del transmissor
        windBatteryStatus      = Estat de la bateria del vent (la bateria de l'anemòmetre)
        batteryStatus1         = Bateria1
