# Generally want a metric system for the Catalan language:
unit_system = metricwx

[Units]

    [[Labels]]

        # These are singular, plural
        meter             = " metre",   " metres"
        day               = " dia",     " dies"
        hour              = " hora",    " hores"
        minute            = " minut",   " minuts"
        second            = " segon",   " segons"

    [[Ordinates]]

        # Ordinal directions. The last one should be for no wind direction (Spanish "W" is "O" for "Oeste")
        directions = N, NNE, NE, ENE, E, ESE, SE, SSE, S, SSO, SO, OSO, O, ONO, NO, NNO, N/A

[Labels]

    # Set to hemisphere abbreviations suitable for your location:
    hemispheres = N, S, E, O

    # Generic labels, keyed by an observation type.
    [[Generic]]
        altimeter              = Altímetre                # QNH
        altimeterRate          = Taxa de canvi de l'altímetre
        appTemp                = Temperatura aparent	# Synonym: Sensación térmica
        appTemp1               = Temperatura aparent 1 # Synonym: Sensación térmica 1
        barometer              = Baròmetre                # QFF
        barometerRate          = Taxa de canvi del baròmetre
        cloudbase              = Altura de la base dels núvols
        dateTime               = Data i hora
        dewpoint               = Punt de rosada
        ET                     = Evapotranspiració
        extraHumid1            = Humitat1
        extraHumid2            = Humitat2
        extraHumid3            = Humitat3
        extraHumid4            = Humitat4
        extraHumid5            = Humitat5
        extraHumid6            = Humitat6
        extraHumid7            = Humitat7
        extraHumid8            = Humitat8
        extraTemp1             = Temperatura1
